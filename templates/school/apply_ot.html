{% extends 'base.html' %}
{% block title %}Apply for OT{% endblock %}
{% block page_title %}Apply for OT{% endblock %}

{% block content %}
<div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
        <div class="card-title" style="margin:0;">Overtime Application</div>
        <a href="{% url 'ot_list' %}" class="btn btn-secondary">← Back</a>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">OT Date</label>
                <input type="date" name="ot_date" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="form-label">Hours Worked</label>
                <input type="number" name="hours" class="form-control"
                       min="0.5" max="12" step="0.5"
                       placeholder="e.g. 2.5" required>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Reason</label>
            <textarea name="reason" class="form-control" rows="4"
                      placeholder="Explain what work was done during overtime..." required></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Submit OT Request</button>
    </form>
</div>
{% endblock %}
