{% extends 'base.html' %}
{% block title %}Create Exam{% endblock %}
{% block page_title %}Create Exam{% endblock %}

{% block content %}
<div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
        <div class="card-title" style="margin:0;">New Exam</div>
        <a href="{% url 'exams' %}" class="btn btn-secondary">← Back</a>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">Exam Title</label>
                <input type="text" name="title" class="form-control" placeholder="e.g. Mid Term Math Exam" required>
            </div>
            <div class="form-group">
                <label class="form-label">Subject</label>
                <input type="text" name="subject" class="form-control" placeholder="e.g. Mathematics" required>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">Class</label>
                <select name="class_name" class="form-control" required>
                    <option value="">Select class</option>
                    {% for c in classes %}
                    <option value="{{ c.class_name }}">Class {{ c.class_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Section</label>
                <select name="section" class="form-control" required>
                    <option value="">Select section</option>
                    {% for c in classes %}
                    <option value="{{ c.section }}">{{ c.section }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">Exam Date</label>
                <input type="date" name="exam_date" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="form-label">Duration (minutes)</label>
                <input type="number" name="duration_mins" class="form-control" value="60" required>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">Total Marks</label>
                <input type="number" name="total_marks" class="form-control" value="100" required>
            </div>
            <div class="form-group">
                <label class="form-label">Pass Marks</label>
                <input type="number" name="pass_marks" class="form-control" value="40" required>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Instructions (optional)</label>
            <textarea name="instructions" class="form-control" rows="4"
                      placeholder="Any special instructions for students..."></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Create Exam</button>
    </form>
</div>
{% endblock %}
