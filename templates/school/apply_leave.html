{% extends 'base.html' %}
{% block title %}Apply for Leave{% endblock %}
{% block page_title %}Apply for Leave{% endblock %}

{% block content %}
<div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
        <div>
            <div class="card-title" style="margin-bottom:4px;">Leave Application</div>
            <p style="color:#6b7280; font-size:14px;">
                Your current leave balance:
                <strong style="color:#4f46e5;">
                    {{ request.user.teacher_profile.leave_balance }} days
                </strong>
            </p>
        </div>
        <a href="{% url 'leave_list' %}" class="btn btn-secondary">← Back</a>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label class="form-label">Leave Type</label>
            <select name="leave_type" class="form-control" required>
                <option value="">Select leave type</option>
                <option value="sick">Sick Leave</option>
                <option value="casual">Casual Leave</option>
                <option value="earned">Earned Leave</option>
                <option value="emergency">Emergency Leave</option>
            </select>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">From Date</label>
                <input type="date" name="from_date" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="form-label">To Date</label>
                <input type="date" name="to_date" class="form-control" required>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Reason</label>
            <textarea name="reason" class="form-control" rows="4"
                      placeholder="Explain the reason for your leave..." required></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Submit Leave Request</button>
    </form>
</div>
{% endblock %}
